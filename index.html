<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keralamtransport.com</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Montserrat',sans-serif;
color:white;
text-align:center;
position:relative;
overflow:hidden;
}

/* background image */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("am_AdobeStock_467454020.jpeg.jpg") center/cover no-repeat;
opacity:0.75;
z-index:-2;
}

/* dark overlay */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b132b;
opacity:0.55;
z-index:-1;
}

/* main card */

.container{
background:rgba(30,41,59,0.75);
padding:55px 65px;
border-radius:16px;
backdrop-filter:blur(8px);
box-shadow:0 30px 60px rgba(0,0,0,0.6);
max-width:520px;
width:90%;
}

/* title */

h1{
font-size:36px;
font-weight:700;
margin-bottom:15px;
letter-spacing:1px;
}

/* subtitle */

.subtitle{
font-size:18px;
color:#cbd5f5;
margin-bottom:35px;
line-height:1.4;
}

/* button */

.emailbtn{
display:inline-block;
padding:14px 30px;
background:#38bdf8;
color:#0b132b;
text-decoration:none;
font-weight:600;
border-radius:10px;
transition:0.25s;
}

.emailbtn:hover{
background:#0ea5e9;
transform:translateY(-2px);
}

/* email text */

.note{
margin-top:25px;
font-size:15px;
color:#cbd5f5;
}

.note a{
color:#38bdf8;
text-decoration:none;
}

.note a:hover{
text-decoration:underline;
}

/* mobile */

@media (max-width:768px){

.container{
padding:35px 25px;
}

h1{
font-size:26px;
}

.subtitle{
font-size:16px;
}

.emailbtn{
padding:12px 22px;
font-size:14px;
}

.note{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>keralamtransport.com</h1>

<p class="subtitle">
This premium domain is available for purchase
</p>

<a class="emailbtn"
href="https://mail.google.com/mail/?view=cm&to=tanmaykataria12@gmail.com">
Contact Owner
</a>

<p class="note">
or email at
<a href="mailto:tanmaykataria12@gmail.com">
tanmaykataria12@gmail.com
</a>
</p>

</div>

</body>

</html>
