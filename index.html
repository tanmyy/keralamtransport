<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>keralamtransport.com</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Montserrat',sans-serif;
color:white;
text-align:center;
overflow:hidden;
position:relative;
}

/* Background */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("am_AdobeStock_467454020.jpeg.jpg") center/cover no-repeat;
z-index:-2;
}

/* Overlay */

body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(11,19,43,0.65);
z-index:-1;
}

/* Card */

.container{
width:440px;
padding:50px 45px;
background:rgba(30,41,59,0.85);
border-radius:18px;
backdrop-filter:blur(8px);
box-shadow:0 25px 70px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
}

/* Title */

h1{
font-size:34px;
font-weight:700;
margin-bottom:22px;
}

/* Subtitle */

.subtitle{
font-size:18px;
line-height:1.6;
color:#cbd5f5;
margin-bottom:35px;
}

/* Button */

.emailbtn{
display:inline-block;
padding:14px 30px;
background:#38bdf8;
color:#0b132b;
text-decoration:none;
font-weight:600;
border-radius:10px;
transition:0.25s;
}

.emailbtn:hover{
background:#0ea5e9;
transform:translateY(-2px);
}

/* Email line */

.note{
margin-top:25px;
font-size:15px;
color:#cbd5f5;
}

.note a{
color:#38bdf8;
text-decoration:none;
}

.note a:hover{
text-decoration:underline;
}

/* Mobile */

@media(max-width:600px){

.container{
width:90%;
padding:35px 25px;
}

h1{
font-size:26px;
}

.subtitle{
font-size:16px;
}

.emailbtn{
padding:12px 22px;
font-size:14px;
}

.note{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>keralamtransport.com  </h1>

<p class="subtitle">
This premium domain is available for purchase
</p>

<a class="emailbtn"
href="https://mail.google.com/mail/?view=cm&to=tanmaykataria12@gmail.com">
Contact Owner
</a>

<p class="note">
or email at
<a href="mailto:tanmaykataria12@gmail.com">
tanmaykataria12@gmail.com
</a>
</p>

</div>

</body>
</html>
